name: CI - Java Backend

on:
  pull_request:
    paths:
      - "backend/cvect/**"
      - ".github/workflows/ci-java.yml"
  push:
    branches:
      - main
    paths:
      - "backend/cvect/**"
      - ".github/workflows/ci-java.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-java-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Compile + Unit Tests (Java 17)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend/cvect

    env:
      MAVEN_OPTS: -Xmx2g
      MAVEN_REPO_LOCAL: ${{ github.workspace }}/.m2-ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          cache-dependency-path: backend/cvect/pom.xml

      - name: Ensure Maven wrapper is executable
        run: chmod +x mvnw

      - name: Compile
        run: |
          ./mvnw --batch-mode --no-transfer-progress \
            -Dmaven.repo.local="$MAVEN_REPO_LOCAL" \
            -s "$GITHUB_WORKSPACE/.github/maven-settings.xml" \
            -DskipTests compile

      - name: Test (exclude integration/postgres)
        run: |
          ./mvnw --batch-mode --no-transfer-progress \
            -Dmaven.repo.local="$MAVEN_REPO_LOCAL" \
            -s "$GITHUB_WORKSPACE/.github/maven-settings.xml" \
            -DexcludedGroups=integration,postgres \
            test

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: java-test-reports
          path: |
            backend/cvect/target/surefire-reports/**
            backend/cvect/target/failsafe-reports/**
          if-no-files-found: ignore
