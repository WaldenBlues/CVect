name: CI Java Backend

on:
  pull_request:
    paths:
      - "backend/cvect/**"
      - ".github/workflows/ci-java.yml"
  push:
    branches:
      - main
    paths:
      - "backend/cvect/**"
      - ".github/workflows/ci-java.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/cvect
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build
        run: ./mvnw -B -q -s "$GITHUB_WORKSPACE/.github/maven-settings.xml" -DskipTests compile

      - name: Run tests
        run: ./mvnw -B -q -s "$GITHUB_WORKSPACE/.github/maven-settings.xml" test
