name: CI Python Embedding Service

on:
  pull_request:
    paths:
      - "Qwen/**"
      - ".github/workflows/ci-python.yml"
  push:
    branches:
      - main
    paths:
      - "Qwen/**"
      - ".github/workflows/ci-python.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Qwen
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Syntax check
        run: python -m compileall -q .
