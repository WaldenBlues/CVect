name: CI - Python Qwen

on:
  pull_request:
    paths:
      - "Qwen/**"
      - "qwen/**"
      - ".github/workflows/ci-python.yml"
  push:
    branches:
      - main
    paths:
      - "Qwen/**"
      - "qwen/**"
      - ".github/workflows/ci-python.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-python-${{ github.ref }}
  cancel-in-progress: true

jobs:
  syntax:
    name: Syntax Checks (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Resolve Python service directory
        id: paths
        run: |
          if [ -d "Qwen" ]; then
            echo "py_dir=Qwen" >> "$GITHUB_OUTPUT"
            echo "has_py=true" >> "$GITHUB_OUTPUT"
          elif [ -d "qwen" ]; then
            echo "py_dir=qwen" >> "$GITHUB_OUTPUT"
            echo "has_py=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_py=false" >> "$GITHUB_OUTPUT"
            echo "No Python service directory (Qwen/ or qwen/) found. Skipping Python checks."
          fi

      - name: Resolve tracked Python files
        id: files
        if: steps.paths.outputs.has_py == 'true'
        run: |
          PY_DIR="${{ steps.paths.outputs.py_dir }}"
          PY_FILES="$(git ls-files "${PY_DIR}" | grep -E '\.py$' || true)"
          if [ -z "${PY_FILES}" ]; then
            echo "has_files=false" >> "$GITHUB_OUTPUT"
            echo "No tracked Python files in ${PY_DIR}. Skipping."
            exit 0
          fi
          echo "has_files=true" >> "$GITHUB_OUTPUT"
          {
            echo "py_files<<EOF"
            echo "${PY_FILES}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Strict parse check (tracked .py files)
        if: ${{ steps.paths.outputs.has_py == 'true' && steps.files.outputs.has_files == 'true' }}
        run: |
          while IFS= read -r f; do
            python -m py_compile "$f"
          done <<< "${{ steps.files.outputs.py_files }}"

      - name: Bytecode compile check (tracked .py files)
        if: ${{ steps.paths.outputs.has_py == 'true' && steps.files.outputs.has_files == 'true' }}
        run: |
          while IFS= read -r f; do
            python -m compileall -q "$f"
          done <<< "${{ steps.files.outputs.py_files }}"

      - name: Python checks skipped
        if: ${{ steps.paths.outputs.has_py != 'true' }}
        run: |
          echo "Skipped: repository does not contain Qwen/qwen Python service code."

      - name: Python checks skipped (no tracked .py files)
        if: ${{ steps.paths.outputs.has_py == 'true' && steps.files.outputs.has_files != 'true' }}
        run: |
          echo "Skipped: no tracked Python files found under the Python service directory."

  dependency-smoke:
    name: Dependency Install + Import Smoke (Python 3.10)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: Qwen/requirements.txt

      - name: Install pinned dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r Qwen/requirements.txt

      - name: Import smoke
        run: |
          python - <<'PY'
          import accelerate
          import fastapi
          import numpy
          import openai
          import pydantic
          import pypdf
          import reportlab
          import safetensors
          import sentencepiece
          import torch
          import transformers
          import uvicorn
          import docx
          print("dependency import smoke passed")
          PY

      - name: Service syntax check
        run: |
          python -m py_compile Qwen/embedding_service.py

      - name: Dependency metadata check
        run: |
          python -m pip check
