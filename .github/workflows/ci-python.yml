name: CI - Python Qwen

on:
  pull_request:
    paths:
      - "Qwen/**"
      - "qwen/**"
      - ".github/workflows/ci-python.yml"
  push:
    branches:
      - main
    paths:
      - "Qwen/**"
      - "qwen/**"
      - ".github/workflows/ci-python.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-python-${{ github.ref }}
  cancel-in-progress: true

jobs:
  syntax:
    name: Syntax Checks (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Resolve Python service directory
        id: paths
        run: |
          if [ -d "Qwen" ]; then
            echo "py_dir=Qwen" >> "$GITHUB_OUTPUT"
            echo "has_py=true" >> "$GITHUB_OUTPUT"
          elif [ -d "qwen" ]; then
            echo "py_dir=qwen" >> "$GITHUB_OUTPUT"
            echo "has_py=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_py=false" >> "$GITHUB_OUTPUT"
            echo "No Python service directory (Qwen/ or qwen/) found. Skipping Python checks."
          fi

      - name: Strict parse check (project entry scripts)
        if: steps.paths.outputs.has_py == 'true'
        working-directory: ${{ steps.paths.outputs.py_dir }}
        run: |
          python -m py_compile embedding_service.py dataGen.py run_datagen_long.py

      - name: Compile all Python files
        if: steps.paths.outputs.has_py == 'true'
        working-directory: ${{ steps.paths.outputs.py_dir }}
        run: |
          python -m compileall -q .

      - name: Python checks skipped
        if: steps.paths.outputs.has_py != 'true'
        run: echo "Skipped: repository does not contain Qwen/qwen Python service code."
