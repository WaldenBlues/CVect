
services:
  postgres:
    image: ${CVECT_POSTGRES_IMAGE:-m.daocloud.io/docker.io/pgvector/pgvector:pg17}
    container_name: cvect-postgres
    environment:
      POSTGRES_DB: ${CVECT_POSTGRES_DB:-cvect}
      POSTGRES_USER: ${CVECT_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${CVECT_POSTGRES_PASSWORD:-postgres}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${CVECT_DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CVECT_POSTGRES_USER:-postgres} -d ${CVECT_POSTGRES_DB:-cvect}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
