# Ralph Orchestrator Configuration
# Generated by: ralph init --backend codex
# Docs: https://github.com/mikeyobrien/ralph-orchestrator

cli:
  backend: "codex"
  # 可选：如果你的 codex 后端按“命令行参数”接收 prompt，可显式加上
  # prompt_mode: "arg"

event_loop:
  prompt_file: "PROMPT.md"
  completion_promise: "LOOP_COMPLETE"
  # The current plan has 24 backlog items; 32 leaves room for multi-step bugfix cycles
  # without letting a single Ralph run sprawl indefinitely.
  max_iterations: 32
  max_runtime_seconds: 14400    # hard cap: 4 hours

